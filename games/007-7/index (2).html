<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>公開テスト用クリックゲーム</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:system-ui,-apple-system,"Yu Gothic UI",sans-serif;
  background:#f2f5f9;
  color:#172033
}
main{
  width:min(92vw,560px);
  background:#fff;
  border:1px solid #d9e0ea;
  border-radius:18px;
  padding:28px;
  text-align:center
}
h1{margin-top:0}
#score{
  font-size:48px;
  font-weight:700;
  margin:18px 0
}
#target{
  width:120px;
  height:120px;
  border:0;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
  background:#2563eb;
  color:#fff
}
#target:active{transform:scale(.96)}
#message{
  min-height:28px;
  margin-top:18px
}
button.secondary{
  margin-top:16px;
  padding:10px 18px;
  border:1px solid #b8c2d1;
  border-radius:10px;
  background:#fff;
  cursor:pointer
}
</style>
</head>
<body>
<main>
  <h1>公開テスト用クリックゲーム</h1>
  <p>青いボタンを10回押すとクリアです。</p>
  <div id="score">0 / 10</div>
  <button id="target" type="button">クリック</button>
  <div id="message" aria-live="polite"></div>
  <button id="reset" class="secondary" type="button">最初から</button>
</main>

<script>
const scoreEl=document.getElementById("score");
const target=document.getElementById("target");
const message=document.getElementById("message");
const reset=document.getElementById("reset");
let score=0;

function update(){
  scoreEl.textContent=`${score} / 10`;
  if(score>=10){
    message.textContent="クリア！ 公開テスト成功です。";
    target.disabled=true;
    target.textContent="完了";
  }
}

target.addEventListener("click",()=>{
  if(score<10){
    score++;
    update();
  }
});

reset.addEventListener("click",()=>{
  score=0;
  target.disabled=false;
  target.textContent="クリック";
  message.textContent="";
  update();
});

update();
</script>
</body>
</html>
