<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テトリス</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }
    .wrap {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    canvas {
      background: #000;
      border: 2px solid #444;
      image-rendering: pixelated;
    }
    .panel {
      width: 180px;
      font-size: 14px;
      line-height: 1.6;
    }
    .panel h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    .stat {
      margin: 8px 0;
    }
    .keys {
      margin-top: 14px;
      color: #ccc;
    }
    .gameover {
      margin-top: 12px;
      color: #ff6b6b;
      font-weight: bold;
      display: none;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: 0;
      border-radius: 6px;
      background: #2d7ef7;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #1e67d8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="300" height="600"></canvas>
    <div class="panel">
      <h1>テトリス</h1>
      <div class="stat">スコア: <span id="score">0</span></div>
      <div class="stat">ライン: <span id="lines">0</span></div>
      <button id="restart">リスタート</button>
      <div class="keys">
        操作<br>
        ← → : 移動<br>
        ↓ : 高速落下<br>
        ↑ / X : 回転<br>
        Z : 逆回転<br>
        Space : 一気に落下
      </div>
      <div class="gameover" id="gameover">ゲームオーバー</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const gameoverEl = document.getElementById('gameover');
    const restartBtn = document.getElementById('restart');

    const COLORS = [
      null,
      '#00f0f0',
      '#0000f0',
      '#f0a000',
      '#f0f000',
      '#00f000',
      '#a000f0',
      '#f00000'
    ];

    const SHAPES = [
      [],
      [[1,1,1,1]],
      [[2,0,0],[2,2,2]],
      [[0,0,3],[3,3,3]],
      [[4,4],[4,4]],
      [[0,5,5],[5,5,0]],
      [[0,6,0],[6,6,6]],
      [[7,7,0],[0,7,7]]
    ];

    let board;
    let player;
    let score;
    let lines;
    let dropCounter;
    let dropInterval;
    let lastTime;
    let gameOver;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function createPiece() {
      const type = 1 + Math.floor(Math.random() * 7);
      const matrix = SHAPES[type].map(row => row.slice());
      return {
        matrix,
        x: Math.floor((COLS - matrix[0].length) / 2),
        y: 0
      };
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            ctx.fillStyle = COLORS[value];
            ctx.fillRect(
              (x + offset.x) * BLOCK,
              (y + offset.y) * BLOCK,
              BLOCK,
              BLOCK
            );
            ctx.strokeStyle = '#111';
            ctx.strokeRect(
              (x + offset.x) * BLOCK,
              (y + offset.y) * BLOCK,
              BLOCK,
              BLOCK
            );
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawMatrix(board, { x: 0, y: 0 });
      drawMatrix(player.matrix, player.pos);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
        }
      }
    }

    function collide(board, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
          if (m[y][x] !== 0 &&
              (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function merge(board, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            board[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function rotate(matrix, dir) {
      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }

    function playerRotate(dir) {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix, dir);

      while (collide(board, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (Math.abs(offset) > player.matrix[0].length) {
          rotate(player.matrix, -dir);
          player.pos.x = pos;
          return;
        }
      }
    }

    function sweep() {
      let rowCount = 0;

      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) continue outer;
        }

        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        y++;
        rowCount++;
      }

      if (rowCount > 0) {
        lines += rowCount;
        score += [0, 100, 300, 500, 800][rowCount] || rowCount * 200;
        updateUI();
      }
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(board, player)) {
        player.pos.y--;
        merge(board, player);
        sweep();
        playerReset();
      }
      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide(board, player)) {
        player.pos.y++;
      }
      player.pos.y--;
      merge(board, player);
      sweep();
      playerReset();
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(board, player)) {
        player.pos.x -= dir;
      }
    }

    function playerReset() {
      player = createPiece();
      if (collide(board, player)) {
        gameOver = true;
        gameoverEl.style.display = 'block';
      }
    }

    function updateUI() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      dropCounter = 0;
      dropInterval = 700;
      lastTime = 0;
      gameOver = false;
      gameoverEl.style.display = 'none';
      player = createPiece();
      updateUI();
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;

      if (!gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) {
          playerDrop();
        }
      }

      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (e) => {
      if (gameOver && e.key !== 'Enter') return;

      if (e.key === 'ArrowLeft') playerMove(-1);
      else if (e.key === 'ArrowRight') playerMove(1);
      else if (e.key === 'ArrowDown') playerDrop();
      else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'x') playerRotate(1);
      else if (e.key.toLowerCase() === 'z') playerRotate(-1);
      else if (e.code === 'Space') {
        e.preventDefault();
        hardDrop();
      } else if (e.key === 'Enter' && gameOver) {
        resetGame();
      }
    });

    restartBtn.addEventListener('click', resetGame);

    resetGame();
    update();
  </script>
</body>
</html>
